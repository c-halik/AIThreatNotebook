name: Build, Push, Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Avoid overlapping deploys if pushes land in quick succession.
concurrency:
  group: ai-threat-notebook-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_name: ${{ steps.meta.outputs.image_name }}
    steps:
      - uses: actions/checkout@v4

      # Docker/GHCR image refs must be lowercase, but the repo name
      # (c-halik/AIThreatNotebook) has uppercase letters - lowercase it here
      # rather than hardcoding the owner/repo elsewhere.
      - name: Compute image name
        id: meta
        run: |
          echo "image_name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # On pull requests we build (to catch Dockerfile/dependency breakage)
      # but don't push - only pushes to main publish an image.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ steps.meta.outputs.image_name }}:latest
            ${{ steps.meta.outputs.image_name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Runs on a self-hosted runner registered on your cloud lab VM. See
  # DEPLOYMENT.md for how to set that runner up. This job is skipped
  # entirely on PRs and only runs after a successful push-to-main build.
  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, security-lab]
    steps:
      - uses: actions/checkout@v4

      - name: Pull latest image and restart stack
        env:
          APP_IMAGE: ${{ needs.build.outputs.image_name }}:latest
        # Explicit bash: GitHub Actions defaults to pwsh on Windows
        # self-hosted runners, which would misparse the ${VAR} syntax below.
        # Requires Git for Windows (bash.exe) on the PATH if the runner is
        # on Windows - see DEPLOYMENT.md's Windows section.
        shell: bash
        run: |
          echo "APP_IMAGE=${APP_IMAGE}" > .env
          docker compose pull app
          docker compose up -d
          docker image prune -f
